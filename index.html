<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lumiel INFJ diary</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F7F4EF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Kaisei+Decol&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f4ef;--surface:#fffdfa;--surface-2:#f4efe8;--ink:#322f2c;--muted:#817970;
  --line:#e7ddd2;--line-strong:#d8c8b9;--accent:#b96852;--accent-strong:#914936;
  --accent-soft:#f4dfd7;--sage:#93a99c;--shadow:0 10px 28px rgba(63,49,40,.08);
  --r-xl:24px;--r-lg:18px;--r-md:14px;font-size:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{margin:0;min-height:100svh;padding-bottom:calc(92px + env(safe-area-inset-bottom));font-family:'Zen Maru Gothic',system-ui,sans-serif;color:var(--ink);background:linear-gradient(180deg,#fbf8f3 0,#f7f4ef 38%,#f3eee7 100%)}
button,input,textarea,select{font:inherit}button{touch-action:manipulation}
header{padding:calc(14px + env(safe-area-inset-top)) 18px 10px;text-align:left;max-width:560px;margin:auto}
.washi{display:inline-flex;padding:4px 10px;border-radius:999px;background:var(--accent-soft);color:var(--accent-strong);font-size:.67rem;letter-spacing:.08em}
header h1{margin:7px 0 0;font-family:'Kaisei Decol',serif;font-size:1.45rem;font-weight:400;letter-spacing:.02em;line-height:1.15}
header p{margin:5px 0 0;color:var(--muted);font-size:.72rem}
main{width:min(100%,560px);margin:auto;padding:4px 12px 0}
.page{display:none}.page.active{display:block;animation:fade .18s ease}@keyframes fade{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.fluffy{position:relative;margin:8px 0 14px;padding:18px 16px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-xl);box-shadow:var(--shadow)}
.fluffy:before{content:"";position:absolute;inset:5px;border:1px solid rgba(185,104,82,.18);border-radius:19px;pointer-events:none}
.cal-head{position:relative;z-index:1;display:grid;grid-template-columns:42px 1fr 42px;align-items:center;margin-bottom:12px}
.cal-head button{width:40px;height:40px;border:1px solid var(--line);border-radius:13px;background:#fff;color:var(--accent-strong);font-size:1.25rem;box-shadow:0 4px 12px rgba(45,35,30,.05)}
.cal-head .ym{text-align:center;font-family:'Kaisei Decol',serif;font-size:1.12rem;letter-spacing:.03em}
.cal-grid{position:relative;z-index:1;display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px}
.cal-dow{text-align:center;padding-bottom:5px;color:var(--muted);font-size:.66rem}.cal-dow:first-child{color:#c87872}.cal-dow:nth-child(7){color:#7389a4}
.cal-cell{position:relative;aspect-ratio:1/1.04;display:flex;flex-direction:column;align-items:center;padding-top:6px;border:1px solid transparent;border-radius:11px;background:#f8f4ee;color:var(--ink);font-size:.74rem;cursor:pointer}
.cal-cell.today{background:#fff7f3;border-color:var(--accent);color:var(--accent-strong);font-weight:700;box-shadow:0 3px 10px rgba(185,104,82,.12)}
.cal-cell.empty{background:transparent;cursor:default}.cal-dots{display:flex;flex-wrap:wrap;justify-content:center;gap:2px;margin-top:4px;max-width:84%}.dot{width:5px;height:5px;border-radius:50%}
.cat-legend{position:relative;z-index:1;display:flex;gap:7px 10px;flex-wrap:wrap;margin-top:13px;padding-top:11px;border-top:1px dashed var(--line);color:var(--muted);font-size:.64rem}.cat-legend span{display:inline-flex;align-items:center;gap:4px}
.search-box{margin:0 0 4px!important;padding:12px 14px!important;border-radius:14px!important}
.event-row{display:grid;grid-template-columns:9px minmax(0,1fr) auto;align-items:center;gap:10px;padding:12px 3px;border-bottom:1px solid #eee6de;font-size:.84rem}.event-row:last-child{border-bottom:0}.cat-chip{width:8px;height:8px;border-radius:50%}.event-title{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}.event-date{font-size:.67rem;color:var(--muted);white-space:nowrap}
input,textarea,select{width:100%;margin:0 0 10px;padding:12px 13px;border:1px solid var(--line-strong);border-radius:13px;background:#fff;color:var(--ink);outline:none}input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(185,104,82,.11)}textarea{min-height:130px;resize:vertical;line-height:1.7}label{display:block;margin:4px 0 5px;color:var(--muted);font-size:.72rem}
.btn{min-height:44px;padding:10px 17px;border:0;border-radius:999px;background:var(--accent);color:white;font-weight:700}.btn.ghost{background:white;color:var(--accent-strong);border:1px solid var(--line-strong)}.btn-row{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;margin-top:12px}
.fab{position:fixed;z-index:19;right:18px;bottom:calc(82px + env(safe-area-inset-bottom));width:56px;height:56px;border:0;border-radius:18px;background:var(--accent);color:white;font-size:1.55rem;box-shadow:0 12px 24px rgba(145,73,54,.28)}
nav.tabbar{position:fixed;z-index:20;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(3,1fr);padding:7px 10px calc(7px + env(safe-area-inset-bottom));background:rgba(255,253,250,.96);border-top:1px solid var(--line);backdrop-filter:blur(18px)}
nav.tabbar button{min-height:54px;border:0;border-radius:15px;background:transparent;color:var(--muted);display:flex;flex-direction:column;justify-content:center;align-items:center;gap:2px;font-size:.7rem}nav.tabbar .icon{font-size:1.15rem}nav.tabbar button.active{background:var(--accent-soft);color:var(--accent-strong);font-weight:700}
.sheet-backdrop{position:fixed;z-index:30;inset:0;display:none;align-items:flex-end;background:rgba(36,29,25,.38);backdrop-filter:blur(4px)}.sheet-backdrop.show{display:flex}.sheet{width:100%;max-height:88svh;overflow:auto;padding:12px 16px calc(22px + env(safe-area-inset-bottom));border-radius:24px 24px 0 0;background:var(--surface);box-shadow:0 -18px 45px rgba(36,29,25,.18);animation:up .22s ease}@keyframes up{from{transform:translateY(24px);opacity:0}to{transform:none;opacity:1}}.sheet-close{display:block;width:42px;height:5px;margin:0 auto 12px;border:0;border-radius:99px;background:#d8cfc6}.sheet h2{margin:0 0 15px;font-family:'Kaisei Decol',serif;font-size:1.18rem;font-weight:400}
.diary-mood-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:11px}.mood-btn{padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--muted);font-size:.76rem}.mood-btn.selected{background:var(--accent);border-color:var(--accent);color:#fff}
.empty-msg{padding:24px 4px;text-align:center;color:var(--muted);font-size:.82rem;line-height:1.7}.loading{padding:38px 0;text-align:center;color:var(--muted);font-size:.82rem}
#today-card h2{font-size:1.15rem!important;margin:0 0 8px!important}#diary-list>div{padding:13px 0!important;line-height:1.7}
@media(min-width:700px){header{padding-top:34px}main{padding-inline:18px}.fluffy{padding:22px}.sheet{width:min(100%,560px);margin:auto}.fab{right:max(22px,calc((100vw - 560px)/2 + 18px))}nav.tabbar{left:50%;right:auto;width:520px;transform:translateX(-50%);bottom:12px;border:1px solid var(--line);border-radius:20px;padding:7px}}
@media(max-width:360px){main{padding-inline:8px}.fluffy{padding:15px 12px}.cal-grid{gap:3px}.cal-cell{font-size:.7rem;border-radius:9px}.event-date{display:none}.fab{right:12px}}
</style>
</head>
<body>

<header>
  <div class="washi">こころ、記録する</div>
  <h1>Lumiel INFJ diary</h1>
  <p id="sync-status">読み込み中…</p>
</header>

<main>
  <!-- 今日 -->
  <section class="page" id="page-today">
    <div class="fluffy" id="today-card">
      <div class="loading">読み込み中…</div>
    </div>
  </section>

  <!-- 予定（カレンダー） -->
  <section class="page active" id="page-calendar">
    <div class="fluffy">
      <div class="cal-head">
        <button onclick="changeMonth(-1)">‹</button>
        <div class="ym" id="cal-ym"></div>
        <button onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="cat-legend" id="cat-legend"></div>
    </div>

    <div class="fluffy">
      <input type="text" class="search-box" id="search-input" placeholder="🔍 予定を検索">
      <div id="event-list"><div class="loading">読み込み中…</div></div>
    </div>
  </section>

  <!-- きもち（日記） -->
  <section class="page" id="page-diary">
    <div class="fluffy" id="diary-list"><div class="loading">読み込み中…</div></div>
  </section>
</main>

<button class="fab" id="fab" onclick="openAddSheet()">＋</button>

<nav class="tabbar">
  <button class="tab-btn" data-page="today" onclick="showPage('today')"><span class="icon">☀️</span>今日</button>
  <button class="tab-btn active" data-page="calendar" onclick="showPage('calendar')"><span class="icon">📅</span>予定</button>
  <button class="tab-btn" data-page="diary" onclick="showPage('diary')"><span class="icon">💭</span>きもち</button>
</nav>

<!-- 予定追加/編集シート -->
<div class="sheet-backdrop" id="event-sheet-backdrop">
  <div class="sheet">
    <button class="sheet-close" onclick="closeSheets()"></button>
    <h2 id="event-sheet-title">予定を追加</h2>
    <input type="hidden" id="ev-id">
    <label>タイトル</label>
    <input type="text" id="ev-title" placeholder="例：ループ会">
    <label>日付</label>
    <input type="date" id="ev-date">
    <label>カテゴリ</label>
    <select id="ev-category"></select>
    <label>繰り返し</label>
    <select id="ev-recurrence">
      <option value="繰り返しなし">繰り返しなし</option>
      <option value="毎日">毎日</option>
      <option value="毎週">毎週</option>
      <option value="毎月">毎月</option>
      <option value="毎年">毎年</option>
      <option value="__nth__">毎月・第○曜日（例：第2月曜日）</option>
    </select>
    <div id="nth-weekday-row" style="display:none;gap:8px;">
      <select id="ev-nth" style="flex:1;">
        <option value="1">第1</option>
        <option value="2">第2</option>
        <option value="3">第3</option>
        <option value="4">第4</option>
        <option value="5">第5</option>
      </select>
      <select id="ev-weekday" style="flex:1;">
        <option value="日">日曜日</option>
        <option value="月">月曜日</option>
        <option value="火">火曜日</option>
        <option value="水">水曜日</option>
        <option value="木">木曜日</option>
        <option value="金">金曜日</option>
        <option value="土">土曜日</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn ghost" id="ev-delete-btn" onclick="deleteEvent()" style="display:none;">削除</button>
      <button class="btn ghost" onclick="closeSheets()">キャンセル</button>
      <button class="btn" onclick="saveEvent()">保存</button>
    </div>
  </div>
</div>

<!-- 日記追加/編集シート -->
<div class="sheet-backdrop" id="diary-sheet-backdrop">
  <div class="sheet">
    <button class="sheet-close" onclick="closeSheets()"></button>
    <h2>今日のきもち</h2>
    <input type="hidden" id="di-id">
    <label>気分</label>
    <div class="diary-mood-row" id="mood-picker"></div>
    <label>エネルギー（1〜5）</label>
    <input type="range" id="di-energy" min="1" max="5" value="3">
    <label>今日あったこと・思ったこと</label>
    <textarea id="di-text" rows="4" placeholder="自由に書いてね"></textarea>
    <label>今日のできたこと</label>
    <input type="text" id="di-todaywin">
    <label>やり残したこと</label>
    <input type="text" id="di-unfinished">
    <div class="btn-row">
      <button class="btn ghost" onclick="closeSheets()">キャンセル</button>
      <button class="btn" onclick="saveDiary()">保存</button>
    </div>
  </div>
</div>

<div class="sheet-backdrop" id="day-sheet-backdrop">
  <div class="sheet">
    <button class="sheet-close" onclick="closeSheets()"></button>
    <h2 id="day-sheet-title"></h2>
    <div id="day-sheet-content"></div>
    <div class="btn-row">
      <button class="btn" onclick="openAddSheet()">＋ 予定を追加</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   設定：ここにApps ScriptのWebアプリURLを貼り付けてください
   ============================================================ */
const API_URL = 'https://script.google.com/macros/s/AKfycbwPKwSkUAQ8lisadGJBEoh2izBfDviWhv69UwoXd5qtf8m5m9Tbu_RltyAFUAA20FE/exec';

const MOODS = ['穏やか','元気','つかれた','かなしい','いらいら','ふあん'];

let state = { categories: [], events: [], diary: [] };
let calYear, calMonth; // calMonth: 0-11
let selectedDayStr = null;

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

async function loadAll() {
  document.getElementById('sync-status').textContent = '読み込み中…';
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    state = data;
    document.getElementById('sync-status').textContent = '同期済み ✓';
    renderAll();
  } catch (err) {
    document.getElementById('sync-status').textContent = '⚠️ 接続できませんでした。API_URLを確認してね';
    console.error(err);
  }
}

async function apiPost(sheet, action, data) {
  await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ sheet, action, data }),
  });
}

function catColor(name) {
  const c = state.categories.find(c => c.name === name);
  return c ? '#' + c.colorHex : '#8E8E93';
}

/* ---------- 日付の表記ゆれ吸収（スプレッドシートがISO日時に変換することがあるため） ---------- */
function parseDateParts(value) {
  if (typeof value === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(value)) {
    const [y, m, d] = value.split('-').map(Number);
    return { y, m: m - 1, d };
  }
  // ISO日時（例: 2026-03-28T15:00:00.000Z）→ JSTのカレンダー日に変換
  const dt = new Date(value);
  const jst = new Date(dt.getTime() + 9 * 3600 * 1000);
  return { y: jst.getUTCFullYear(), m: jst.getUTCMonth(), d: jst.getUTCDate() };
}
function toDateOnlyStr(value) {
  const p = parseDateParts(value);
  return p.y + '-' + String(p.m + 1).padStart(2, '0') + '-' + String(p.d).padStart(2, '0');
}

/* ---------- 「毎月第N曜日」パターンの解析・計算（例: 毎月第2月曜日） ---------- */
const WEEKDAY_CHARS = ['日','月','火','水','木','金','土'];
function parseNthWeekday(recurrence) {
  if (typeof recurrence !== 'string') return null;
  const m = recurrence.match(/^毎月第([1-5])(日|月|火|水|木|金|土)曜日$/);
  if (!m) return null;
  return { nth: Number(m[1]), weekday: WEEKDAY_CHARS.indexOf(m[2]) };
}
function nthWeekdayDate(year, month, nth, weekday) {
  const first = new Date(year, month, 1);
  const firstWeekday = first.getDay();
  const day = 1 + ((7 + weekday - firstWeekday) % 7) + (nth - 1) * 7;
  const date = new Date(year, month, day);
  if (date.getMonth() !== month) return null; // 例：第5金曜日が存在しない月
  return date;
}

/* ---------- 繰り返し予定を展開して「その月に表示すべき予定」を返す ---------- */
function expandForMonth(year, month) {
  // month: 0-11
  const results = [];
  const first = new Date(year, month, 1);
  const last = new Date(year, month + 1, 0);
  state.events.forEach(ev => {
    if (!ev.date) return;
    const p = parseDateParts(ev.date);
    const base = new Date(p.y, p.m, p.d);
    if (isNaN(base)) return;
    if (ev.recurrence === '繰り返しなし') {
      if (base >= first && base <= last) results.push({ ...ev, occDate: ev.date });
      return;
    }
    const nw = parseNthWeekday(ev.recurrence);
    if (nw) {
      if (base <= last) {
        const occ = nthWeekdayDate(year, month, nw.nth, nw.weekday);
        if (occ && occ >= base) results.push({ ...ev, occDate: fmtDate(occ) });
      }
      return;
    }
    if (ev.recurrence === '毎年') {
      const occ = new Date(year, base.getMonth(), base.getDate());
      if (occ.getMonth() === month && occ >= base) {
        results.push({ ...ev, occDate: fmtDate(occ) });
      }
      return;
    }
    if (ev.recurrence === '毎月') {
      if (base <= last) {
        const occ = new Date(year, month, base.getDate());
        if (occ.getMonth() === month) results.push({ ...ev, occDate: fmtDate(occ) });
      }
      return;
    }
    if (ev.recurrence === '毎週') {
      if (base <= last) {
        let d = new Date(base);
        while (d < first) d.setDate(d.getDate() + 7);
        while (d <= last) {
          if (d.getMonth() === month) results.push({ ...ev, occDate: fmtDate(d) });
          d.setDate(d.getDate() + 7);
        }
      }
      return;
    }
    if (ev.recurrence === '毎日') {
      let d = new Date(Math.max(base, first));
      while (d <= last) {
        results.push({ ...ev, occDate: fmtDate(d) });
        d.setDate(d.getDate() + 1);
      }
    }
  });
  return results;
}
function fmtDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

/* ---------- カレンダー描画 ---------- */
function renderCalendar() {
  document.getElementById('cal-ym').textContent = `${calYear}年 ${calMonth+1}月`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  ['日','月','火','水','木','金','土'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow'; el.textContent = d;
    grid.appendChild(el);
  });
  const first = new Date(calYear, calMonth, 1);
  const startOffset = first.getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const monthEvents = expandForMonth(calYear, calMonth);
  const byDay = {};
  monthEvents.forEach(e => { (byDay[e.occDate] = byDay[e.occDate] || []).push(e); });

  for (let i = 0; i < startOffset; i++) {
    const el = document.createElement('div'); el.className = 'cal-cell empty';
    grid.appendChild(el);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const el = document.createElement('div');
    el.className = 'cal-cell' + (dateStr === todayStr() ? ' today' : '');
    el.innerHTML = `<div>${d}</div>`;
    const dots = document.createElement('div'); dots.className = 'cal-dots';
    (byDay[dateStr] || []).slice(0,4).forEach(e => {
      const dot = document.createElement('div'); dot.className = 'dot';
      dot.style.background = catColor(e.categoryName);
      dots.appendChild(dot);
    });
    el.appendChild(dots);
    el.onclick = () => openDaySheet(dateStr, byDay[dateStr] || []);
    grid.appendChild(el);
  }

  const legend = document.getElementById('cat-legend');
  legend.innerHTML = state.categories.map(c =>
    `<span><span class="dot" style="background:#${c.colorHex}"></span>${c.name}</span>`
  ).join('');
}

function changeMonth(delta) {
  calMonth += delta;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

/* ---------- 予定一覧（検索） ---------- */
function renderEventList(filter = '') {
  const list = document.getElementById('event-list');
  const upcoming = expandForMonth(calYear, calMonth)
    .concat(expandForMonth(calYear, calMonth+1 > 11 ? 0 : calMonth+1))
    .filter(e => !filter || e.title.includes(filter))
    .sort((a,b) => a.occDate.localeCompare(b.occDate));
  if (!upcoming.length) {
    list.innerHTML = '<div class="empty-msg">予定はまだないよ</div>';
    return;
  }
  list.innerHTML = upcoming.map(e => `
    <div class="event-row">
      <div class="cat-chip" style="background:${catColor(e.categoryName)}"></div>
      <div class="event-title">${escapeHtml(e.title)}</div>
      <div class="event-date">${e.occDate}</div>
    </div>
  `).join('');
}

/* ---------- 今日タブ ---------- */
function renderToday() {
  const t = todayStr();
  const todays = expandForMonth(calYear, calMonth).filter(e => e.occDate === t);
  const card = document.getElementById('today-card');
  card.innerHTML = `
    <h2 style="font-family:'Kaisei Decol',serif;margin-top:0;">${t}</h2>
    ${todays.length ? todays.map(e => `
      <div class="event-row">
        <div class="cat-chip" style="background:${catColor(e.categoryName)}"></div>
        <div class="event-title">${escapeHtml(e.title)}</div>
      </div>`).join('') : '<div class="empty-msg">今日の予定はないよ</div>'}
  `;
}

/* ---------- 日記タブ ---------- */
function renderDiary() {
  const list = document.getElementById('diary-list');
  const sorted = [...state.diary].sort((a,b) => (b.date||'').localeCompare(a.date||''));
  if (!sorted.length) {
    list.innerHTML = '<div class="empty-msg">まだ記録がないよ。＋ボタンから書いてみてね</div>';
    return;
  }
  list.innerHTML = sorted.map(d => `
    <div style="border-bottom:1px dashed var(--line);padding:10px 0;">
      <div style="font-size:0.7rem;color:var(--ink-soft);">${d.date} ・ ${escapeHtml(d.mood||'')} ・ energy ${d.energy||''}</div>
      <div style="font-size:0.85rem;margin-top:4px;white-space:pre-wrap;">${escapeHtml(d.text||'')}</div>
      ${d.todayWin ? `<div style="font-size:0.78rem;color:var(--accent);margin-top:4px;">✅ ${escapeHtml(d.todayWin)}</div>` : ''}
    </div>
  `).join('');
}

function renderAll() {
  renderCalendar();
  renderEventList(document.getElementById('search-input').value);
  renderToday();
  renderDiary();
  populateCategorySelect();
  populateMoodPicker();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- タブ切り替え ---------- */
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.page === name));
}

/* ---------- 予定シート ---------- */
function populateCategorySelect() {
  const sel = document.getElementById('ev-category');
  sel.innerHTML = state.categories.map(c => `<option value="${escapeHtml(c.name)}">${escapeHtml(c.name)}</option>`).join('');
}

function openAddSheet() {
  closeSheets();
  if (document.getElementById('page-diary').classList.contains('active')) {
    openDiarySheet();
    return;
  }
  document.getElementById('event-sheet-title').textContent = '予定を追加';
  document.getElementById('ev-id').value = '';
  document.getElementById('ev-title').value = '';
  document.getElementById('ev-date').value = selectedDayStr || todayStr();
  document.getElementById('ev-recurrence').value = '繰り返しなし';
  document.getElementById('nth-weekday-row').style.display = 'none';
  document.getElementById('ev-delete-btn').style.display = 'none';
  document.getElementById('event-sheet-backdrop').classList.add('show');
}

function openEditSheet(id) {
  const ev = state.events.find(e => e.id === id);
  if (!ev) return;
  closeSheets();
  document.getElementById('event-sheet-title').textContent = '予定を編集';
  document.getElementById('ev-id').value = ev.id;
  document.getElementById('ev-title').value = ev.title;
  document.getElementById('ev-date').value = toDateOnlyStr(ev.date);
  document.getElementById('ev-category').value = ev.categoryName;
  const nw = parseNthWeekday(ev.recurrence);
  if (nw) {
    document.getElementById('ev-recurrence').value = '__nth__';
    document.getElementById('ev-nth').value = nw.nth;
    document.getElementById('ev-weekday').value = WEEKDAY_CHARS[nw.weekday];
    document.getElementById('nth-weekday-row').style.display = 'flex';
  } else {
    document.getElementById('ev-recurrence').value = ev.recurrence;
    document.getElementById('nth-weekday-row').style.display = 'none';
  }
  document.getElementById('ev-delete-btn').style.display = 'inline-block';
  document.getElementById('event-sheet-backdrop').classList.add('show');
}

async function saveEvent() {
  const id = document.getElementById('ev-id').value || 'ev_' + Date.now();
  let recurrenceValue = document.getElementById('ev-recurrence').value;
  if (recurrenceValue === '__nth__') {
    const nth = document.getElementById('ev-nth').value;
    const wd = document.getElementById('ev-weekday').value;
    recurrenceValue = `毎月第${nth}${wd}曜日`;
  }
  const data = {
    id,
    title: document.getElementById('ev-title').value,
    date: document.getElementById('ev-date').value,
    categoryName: document.getElementById('ev-category').value,
    recurrence: recurrenceValue,
    alarm: 'なし',
    isCompleted: 'FALSE',
  };
  if (!data.title || !data.date) { alert('タイトルと日付を入れてね'); return; }
  const idx = state.events.findIndex(e => e.id === id);
  if (idx >= 0) state.events[idx] = data; else state.events.push(data);
  closeSheets();
  renderAll();
  await apiPost('Events', 'upsert', data);
}

async function deleteEvent() {
  const id = document.getElementById('ev-id').value;
  if (!id) return;
  if (!confirm('この予定を削除する？')) return;
  state.events = state.events.filter(e => e.id !== id);
  closeSheets();
  renderAll();
  await apiPost('Events', 'delete', { id });
}

/* ---------- 日記シート ---------- */
let selectedMood = MOODS[0];
function populateMoodPicker() {
  const box = document.getElementById('mood-picker');
  box.innerHTML = MOODS.map(m =>
    `<button type="button" class="mood-btn${m===selectedMood?' selected':''}" onclick="pickMood('${m}')">${m}</button>`
  ).join('');
}
function pickMood(m) {
  selectedMood = m;
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.toggle('selected', b.textContent === m));
}

function openDiarySheet() {
  closeSheets();
  document.getElementById('di-id').value = '';
  document.getElementById('di-text').value = '';
  document.getElementById('di-todaywin').value = '';
  document.getElementById('di-unfinished').value = '';
  document.getElementById('di-energy').value = 3;
  selectedMood = MOODS[0];
  populateMoodPicker();
  document.getElementById('diary-sheet-backdrop').classList.add('show');
}

async function saveDiary() {
  const now = new Date();
  const dateStr = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':00';
  const data = {
    id: 'di_' + Date.now(),
    date: dateStr,
    mood: selectedMood,
    moodImage: '',
    energy: document.getElementById('di-energy').value,
    text: document.getElementById('di-text').value,
    todayWin: document.getElementById('di-todaywin').value,
    unfinishedTasks: document.getElementById('di-unfinished').value,
    tomorrowOne: '', relationPerson: '', relationThought: '', relationWish: '', relationReflection: '',
  };
  state.diary.push(data);
  closeSheets();
  renderAll();
  await apiPost('Diary', 'upsert', data);
}

/* ---------- 日ごとの詳細シート ---------- */
function openDaySheet(dateStr, events) {
  closeSheets();
  selectedDayStr = dateStr;
  document.getElementById('day-sheet-title').textContent = dateStr;
  const content = document.getElementById('day-sheet-content');
  content.innerHTML = events.length ? events.map(e => `
    <div class="event-row" style="cursor:pointer;" onclick="openEditSheet('${e.id}')">
      <div class="cat-chip" style="background:${catColor(e.categoryName)}"></div>
      <div class="event-title">${escapeHtml(e.title)}</div>
    </div>
  `).join('') : '<div class="empty-msg">この日の予定はまだないよ</div>';
  document.getElementById('day-sheet-backdrop').classList.add('show');
}

function closeSheets() {
  document.querySelectorAll('.sheet-backdrop').forEach(s => s.classList.remove('show'));
}
document.querySelectorAll('.sheet-backdrop').forEach(b => {
  b.addEventListener('click', e => { if (e.target === b) closeSheets(); });
});

document.getElementById('search-input').addEventListener('input', e => renderEventList(e.target.value));
document.getElementById('ev-recurrence').addEventListener('change', e => {
  document.getElementById('nth-weekday-row').style.display = e.target.value === '__nth__' ? 'flex' : 'none';
});

/* ---------- init ---------- */
(function init() {
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
  loadAll();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();
</script>
